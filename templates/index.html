<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西安地铁出行小助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 span {
            color: #e41b17;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .metro-icon {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: #e41b17;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            line-height: 50px;
            font-size: 1.5em;
        }

        .search-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .nlp-input {
            margin-bottom: 20px;
        }

        .nlp-input label {
            display: block;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .nlp-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .nlp-input input:focus {
            outline: none;
            border-color: #e41b17;
        }

        .nlp-btn {
            width: 100%;
            padding: 12px;
            background: #2DBE65;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .nlp-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .search-row {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-field {
            flex: 1;
        }

        .search-field label {
            display: block;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .search-field select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            background: #f8f9fa;
            cursor: pointer;
        }

        .search-field select:focus {
            outline: none;
            border-color: #e41b17;
            background: white;
        }

        .search-arrow {
            font-size: 2em;
            color: #e41b17;
            padding-top: 25px;
        }

        .swap-btn {
            background: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        .swap-btn:hover {
            background: #e41b17;
            color: white;
            transform: rotate(180deg);
        }

        .search-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #e41b17 0%, #c4170f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(228, 27, 23, 0.3);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(228, 27, 23, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .results {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .results.show {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .results-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .reset-btn {
            background: #f0f0f0;
            color: #666;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .reset-btn:hover {
            background: #e41b17;
            color: white;
        }

        .route-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #e41b17;
            transition: all 0.3s;
        }

        .route-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .route-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .route-type.direct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .route-type.transfer {
            background: #fff3e0;
            color: #e65100;
        }

        .route-info {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }

        .route-stat {
            text-align: center;
        }

        .route-stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #e41b17;
        }

        .route-stat-label {
            font-size: 0.85em;
            color: #666;
        }

        .route-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .line-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            min-width: 60px;
            text-align: center;
        }

        .line-direction {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            background: #f0f0f0;
            color: #666;
            font-size: 0.8em;
            margin-left: 8px;
        }

        .station-arrow {
            color: #999;
            font-size: 1.2em;
        }

        .transfer-info {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px dashed #ddd;
        }

        .transfer-station {
            font-weight: bold;
            color: #e41b17;
            margin-bottom: 10px;
        }

        .direction-note {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .line-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
            color: #666;
        }

        .legend-dot {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .search-row {
                flex-direction: column;
            }

            .search-arrow {
                transform: rotate(90deg);
                padding: 0;
            }

            .route-info {
                flex-wrap: wrap;
                gap: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .station-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
        }

        .station-item {
            background: #eee;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .station-item.start,
        .station-item.end {
            background: #e41b17;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>🚇</span> 西安地铁出行小助手</h1>
            <p>智能路线规划，助您便捷出行</p>
        </div>

        <div class="search-box">
            <div class="nlp-input">
                <label>💬 自然语言查询（如：我要从东长安街去造字台）</label>
                <input type="text" id="nlpInput" placeholder="请输入您的出行需求...">
                <button class="nlp-btn" onclick="processNLP()">🔍 解析查询</button>
            </div>
            <div class="search-row">
                <div class="search-field">
                    <label>🚩 起点站</label>
                    <select id="origin">
                        <option value="">请选择出发站</option>
                        {% for station in stations %}
                        <option value="{{ station }}">{{ station }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="swap-btn" onclick="swapStations()">⇄</div>
                <div class="search-field">
                    <label>🏁 终点站</label>
                    <select id="destination">
                        <option value="">请选择到达站</option>
                        {% for station in stations %}
                        <option value="{{ station }}">{{ station }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <button class="search-btn" onclick="searchRoute()">查询路线</button>
        </div>

        <div class="results" id="results">
            <div class="results-header">
                <div class="results-title">出行方案</div>
                <button class="reset-btn" onclick="resetSearch()">重新查询</button>
            </div>
            <div id="resultsContent"></div>

            <div class="line-legend">
                <span style="font-weight: bold; width: 100%; margin-bottom: 5px;">线路图例：</span>
                {% for line, data in metro_data.items() %}
                <div class="legend-item">
                    <div class="legend-dot" style="background: {{ data.color }};"></div>
                    <span>{{ line }}</span>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        function swapStations() {
            const origin = document.getElementById('origin');
            const destination = document.getElementById('destination');
            const temp = origin.value;
            origin.value = destination.value;
            destination.value = temp;
        }

        async function searchRoute() {
            const origin = document.getElementById('origin').value;
            const destination = document.getElementById('destination').value;

            if (!origin || !destination) {
                alert('请选择起点和终点站');
                return;
            }

            if (origin === destination) {
                alert('起点和终点不能相同');
                return;
            }

            const resultsDiv = document.getElementById('results');
            const contentDiv = document.getElementById('resultsContent');
            resultsDiv.classList.add('show');
            contentDiv.innerHTML = '<div class="loading">🔄 正在查询最佳路线...</div>';

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ origin, destination })
                });

                const data = await response.json();

                if (data.error) {
                    contentDiv.innerHTML = `<div class="error-msg">⚠️ ${data.error}</div>`;
                    return;
                }

                let html = '';
                data.results.forEach((result, index) => {
                    html += renderRoute(result, origin, destination, index);
                });

                contentDiv.innerHTML = html;
                resultsDiv.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                contentDiv.innerHTML = '<div class="error-msg">⚠️ 查询失败，请重试</div>';
            }
        }

        function renderRoute(result, origin, destination, index) {
            const route = result.route;
            const typeClass = result.type === '直达' ? 'direct' : 'transfer';
            const isTransfer = result.type === '换乘1次';

            let lineHtml = '';
            let stationHtml = '';

            stationHtml += `<div class="station-item start">${origin}</div><span class="station-arrow">→</span>`;

            route.stations.slice(1).forEach(station => {
                if (isTransfer && route.transfers.length > 0 && station === route.transfers[0].station) {
                    stationHtml += `<div class="station-item" style="background: #e41b17; color: white;">${station}</div>`;
                } else {
                    stationHtml += `<div class="station-item">${station}</div>`;
                }
                stationHtml += `<span class="station-arrow">→</span>`;
            });

            lineHtml += `<div class="line-badge" style="background: ${route.color};">${route.line}</div>`;
            lineHtml += `<span class="line-direction">${route.direction}</span>`;

            if (isTransfer && route.transfers.length > 0) {
                const transfer = route.transfers[0];
                stationHtml += `<div class="station-item" style="background: ${transfer.to_color}; color: white; margin-left: 10px;">${transfer.station}换乘→</div>`;
                stationHtml += `<span class="station-arrow">→</span>`;

                transfer.second_stations.slice(1).forEach(station => {
                    stationHtml += `<div class="station-item">${station}</div>`;
                    stationHtml += `<span class="station-arrow">→</span>`;
                });

                lineHtml += `<span style="margin: 0 10px; color: #999;">|</span>`;
                lineHtml += `<div class="line-badge" style="background: ${transfer.to_color};">${transfer.to_line}</div>`;
                lineHtml += `<span class="line-direction">${transfer.second_direction}</span>`;
            }

            stationHtml += `<div class="station-item end">${destination}</div>`;

            return `
                <div class="route-card">
                    <div class="route-type ${typeClass}">${result.type}</div>
                    <div class="route-info">
                        <div class="route-stat">
                            <div class="route-stat-value">${result.total_stations}</div>
                            <div class="route-stat-label">站数</div>
                        </div>
                        <div class="route-stat">
                            <div class="route-stat-value">${result.total_time}</div>
                            <div class="route-stat-label">分钟</div>
                        </div>
                    </div>
                    <div class="route-line">
                        ${lineHtml}
                    </div>
                    <div class="station-list">
                        ${stationHtml}
                    </div>
                    ${isTransfer ? `<div class="direction-note">📍 在 <strong>${route.transfers[0].station}</strong> 站换乘 ${route.transfers[0].to_line}</div>` : '<div class="direction-note">📍 方向：全程直达</div>'}
                </div>
            `;
        }

        function resetSearch() {
            document.getElementById('origin').value = '';
            document.getElementById('destination').value = '';
            document.getElementById('results').classList.remove('show');
            document.getElementById('resultsContent').innerHTML = '';
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRoute();
            }
        });

        async function processNLP() {
            const nlpInput = document.getElementById('nlpInput');
            const query = nlpInput.value.trim();
            
            if (!query) {
                alert('请输入查询内容');
                return;
            }

            try {
                const response = await fetch('/api/nlp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (data.error) {
                    alert(`解析失败: ${data.error}`);
                    return;
                }

                // 自动填充到下拉框
                const originSelect = document.getElementById('origin');
                const destinationSelect = document.getElementById('destination');
                
                // 查找并选择对应的选项
                for (let i = 0; i < originSelect.options.length; i++) {
                    if (originSelect.options[i].value === data.origin) {
                        originSelect.selectedIndex = i;
                        break;
                    }
                }

                for (let i = 0; i < destinationSelect.options.length; i++) {
                    if (destinationSelect.options[i].value === data.destination) {
                        destinationSelect.selectedIndex = i;
                        break;
                    }
                }

                // 自动执行查询
                searchRoute();

            } catch (error) {
                alert('解析失败，请重试');
            }
        }
    </script>
</body>
</html>
